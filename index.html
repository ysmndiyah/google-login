<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Selamat Datang Kembali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: white;
            border: 1px solid #dadce0;
            color: #3c4043;
            font-weight: 500;
            padding: 10px 24px;
            border-radius: 8px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .google-btn:hover {
            background: #f8f9fa;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.30), 0 1px 3px 1px rgba(60,64,67,0.15);
        }

        #notification {
            position: fixed;
            top: 20px;
            right: 20px;
            transform: translateX(150%);
            transition: transform 0.3s ease-out;
            z-index: 50;
        }

        #notification.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <!-- Notifikasi -->
    <div id="notification" class="bg-white border-l-4 border-indigo-600 p-4 rounded shadow-lg max-w-xs">
        <div class="flex items-center">
            <div id="notif-icon" class="flex-shrink-0 text-indigo-600">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20"><path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"/></svg>
            </div>
            <div class="ml-3">
                <p class="text-sm text-gray-700" id="notification-message"></p>
            </div>
        </div>
    </div>

    <div class="login-card">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Selamat Datang</h1>
            <p class="text-gray-500">Masuk untuk melanjutkan ke aplikasi</p>
        </div>

        <!-- Tombol Google -->
        <button id="googleLoginBtn" class="google-btn mb-6">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Masuk dengan Google
        </button>

        <div class="relative flex items-center mb-6">
            <div class="flex-grow border-t border-gray-300"></div>
            <span class="flex-shrink mx-4 text-gray-400 text-sm">atau</span>
            <div class="flex-grow border-t border-gray-300"></div>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required placeholder="nama@email.com" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>
            
            <div>
                <div class="flex justify-between mb-1">
                    <label class="block text-sm font-medium text-gray-700">Kata Sandi</label>
                </div>
                <input type="password" id="password" required placeholder="••••••••" 
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-indigo-600 text-white font-semibold py-3 rounded-lg hover:bg-indigo-700 active:scale-[0.98] transition-all shadow-md flex justify-center items-center">
                <span id="btnText">Masuk</span>
                <div id="loader" class="hidden animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full ml-2"></div>
            </button>
        </form>
    </div>

   <script>
/* ================= CONFIG ================= */
const clientId = "433796767618-rmhkfr6iu7olfmt1q61umi8kogrgpnk3.apps.googleusercontent.com";
const redirectUri = "http://localhost:8080/";
const API_URL = "http://localhost:8080/api/login";

/* ================= ELEMENT ================= */
const loginForm = document.getElementById('loginForm');
const googleBtn = document.getElementById('googleLoginBtn');
const submitBtn = document.getElementById('submitBtn');
const btnText = document.getElementById('btnText');
const loader = document.getElementById('loader');
const notification = document.getElementById('notification');
const notificationMsg = document.getElementById('notification-message');

/* ================= UI ================= */
function showToast(message, isError = false) {
    notificationMsg.innerText = message;
    notification.classList.add('show');
    notification.style.borderColor = isError ? '#ef4444' : '#4f46e5';
    setTimeout(() => notification.classList.remove('show'), 4000);
}

function setSubmitting(isSubmitting) {
    submitBtn.disabled = isSubmitting;
    btnText.innerText = isSubmitting ? "Memproses..." : "Masuk";
    loader.classList.toggle('hidden', !isSubmitting);
}

/* ================= LOGIN EMAIL ================= */
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    setSubmitting(true);

    const payload = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
    };

    try {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (response.ok) {
            showToast("Login Berhasil!");
            localStorage.setItem('token', result.token);
            setTimeout(() => window.location.href = "/dashboard.html", 1000);
        } else {
            showToast(result.message || "Login gagal", true);
        }
    } catch {
        showToast("Server error", true);
    } finally {
        setSubmitting(false);
    }
});

/* ================= PKCE ================= */
function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
}

async function sha256(plain) {
    const data = new TextEncoder().encode(plain);
    return await crypto.subtle.digest('SHA-256', data);
}

function base64urlencode(buffer) {
    return btoa(String.fromCharCode(...new Uint8Array(buffer)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

/* ================= LOGIN GOOGLE ================= */
googleBtn.addEventListener('click', async () => {
    showToast("Mengalihkan ke Google...");

    const codeVerifier = generateRandomString(64);
    const hashed = await sha256(codeVerifier);
    const codeChallenge = base64urlencode(hashed);

    localStorage.setItem("code_verifier", codeVerifier);

    const url = `https://accounts.google.com/o/oauth2/v2/auth?` +
        `client_id=${clientId}` +
        `&redirect_uri=${redirectUri}` +
        `&response_type=code` +
        `&scope=openid email profile` +
        `&code_challenge=${codeChallenge}` +
        `&code_challenge_method=S256`;

    window.location.href = url;
});

/* ================= HANDLE CALLBACK ================= */
window.addEventListener("load", async () => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (!code) return;

    const codeVerifier = localStorage.getItem("code_verifier");

    if (!codeVerifier) {
        showToast("Verifier tidak ditemukan", true);
        return;
    }

    try {
        const res = await fetch("http://localhost:8080/api/google/exchange", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                code: code,
                code_verifier: codeVerifier
            })
        });

        const user = await res.json();

        console.log(user);
        showToast("Login Google berhasil: " + user.email);

        // bersihkan URL
        window.history.replaceState({}, document.title, "/");

        setTimeout(() => {
            window.location.href = "/dashboard.html";
        }, 1000);

    } catch (err) {
        showToast("Login Google gagal", true);
    }
});
</script>
</body>
</html>
