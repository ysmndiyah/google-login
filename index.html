<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Selamat Datang</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-6">Login</h1>

    <!-- GOOGLE LOGIN -->
    <button id="googleLoginBtn"
        class="w-full flex items-center justify-center gap-2 border py-2 rounded-lg mb-5 hover:bg-gray-100">
        <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20">
        Masuk dengan Google
    </button>

    <div class="text-center text-gray-400 mb-4">atau</div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="space-y-4">
        <input id="email" type="email" placeholder="Email"
            class="w-full border p-2 rounded-lg" required>

        <input id="password" type="password" placeholder="Password"
            class="w-full border p-2 rounded-lg" required>

        <button class="w-full bg-indigo-600 text-white py-2 rounded-lg">
            Masuk
        </button>
    </form>
</div>

<script>
/* ================= CONFIG ================= */
const clientId = "433796767618-rmhkfr6iu7olfmt1q61umi8kogrgpnk3.apps.googleusercontent.com";
const redirectUri = "https://google-login-production-4ce7.up.railway.app/";
const BASE_URL = "https://google-login-production-4ce7.up.railway.app";

/* ================= LOGIN EMAIL ================= */
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const res = await fetch(BASE_URL + "/api/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        })
    });

    if (res.ok) {
        alert("Login berhasil");
        window.location.href = "/dashboard.html";
    } else {
        alert("Login gagal");
    }
});

/* ================= PKCE ================= */
function generateRandomString(length) {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < length; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
}

async function sha256(plain) {
    const data = new TextEncoder().encode(plain);
    return await crypto.subtle.digest('SHA-256', data);
}

function base64urlencode(buffer) {
    return btoa(String.fromCharCode(...new Uint8Array(buffer)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

/* ================= LOGIN GOOGLE ================= */
document.getElementById("googleLoginBtn").addEventListener("click", async () => {
    const codeVerifier = generateRandomString(64);
    const hashed = await sha256(codeVerifier);
    const codeChallenge = base64urlencode(hashed);

    localStorage.setItem("code_verifier", codeVerifier);

    const url = `https://accounts.google.com/o/oauth2/v2/auth?` +
        `client_id=${clientId}` +
        `&redirect_uri=${redirectUri}` +
        `&response_type=code` +
        `&scope=openid email profile` +
        `&code_challenge=${codeChallenge}` +
        `&code_challenge_method=S256`;

    window.location.href = url;
});

/* ================= CALLBACK ================= */
window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    if (!code) return;

    const codeVerifier = localStorage.getItem("code_verifier");

    if (!codeVerifier) {
        alert("Verifier tidak ditemukan");
        return;
    }

    const res = await fetch(BASE_URL + "/api/google/exchange", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            code: code,
            code_verifier: codeVerifier
        })
    });

    const user = await res.json();

    console.log(user);

    alert("Login Google berhasil: " + user.email);

    // hapus ?code
    window.history.replaceState({}, document.title, "/");

    // redirect ke dashboard
    window.location.href = "/dashboard.html";
};
</script>

</body>
</html>
