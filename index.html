<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Aplikasi Saya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95) translate(-50%, -50%); }
            to { opacity: 1; transform: scale(1) translate(-50%, -50%); }
        }
        .modal-animate {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col items-center justify-center font-sans text-gray-900 antialiased">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 m-4">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-100 text-blue-600 mb-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Selamat Datang Kembali</h1>
            <p class="text-gray-500 mt-2 text-sm">Silakan masukkan detail akun Anda untuk melanjutkan.</p>
        </div>

        <!-- Tombol Login Google -->
        <button id="googleLoginBtn" type="button" class="w-full flex items-center justify-center px-4 py-2.5 border border-gray-300 rounded-lg shadow-sm bg-white text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors mb-6">
            <svg class="h-5 w-5 mr-2" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Lanjutkan dengan Google
        </button>

        <!-- Garis Pemisah (Divider) -->
        <div class="relative flex items-center justify-center mb-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-200"></div>
            </div>
            <div class="relative bg-white px-4 text-sm text-gray-500">
                Atau login dengan email
            </div>
        </div>

        <!-- Form Login Standar -->
        <form id="standardLoginForm" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="nama@email.com" required>
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Kata Sandi</label>
                <input type="password" id="password" name="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all" placeholder="••••••••" required>
            </div>

            <div class="flex items-center justify-between mt-2">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-700">
                        Ingat saya
                    </label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Lupa sandi?</a>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition-colors mt-6 shadow-sm">
                Masuk
            </button>
        </form>

        <!-- Footer -->
        <p class="mt-8 text-center text-sm text-gray-600">
            Belum punya akun? 
            <a href="#" class="font-medium text-blue-600 hover:text-blue-500">Daftar sekarang</a>
        </p>
    </div>

    <!-- Modal Pesan Interaksi -->
    <div id="customModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
        <div class="absolute inset-0 bg-black bg-opacity-40" id="modalOverlay"></div>
        <div class="bg-white rounded-xl p-6 w-80 shadow-2xl z-10 absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 modal-animate">
            <div id="modalIcon" class="mb-4"></div>
            <h3 class="text-lg font-bold text-gray-900 mb-2" id="modalTitle">Judul</h3>
            <p class="text-sm text-gray-600 mb-6" id="modalText">Deskripsi pesan ada di sini.</p>
            <button id="closeModalBtn" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-800 font-medium py-2 rounded-lg transition-colors">
                Tutup
            </button>
        </div>
    </div>

    <!-- Script Logika -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const googleLoginBtn = document.getElementById('googleLoginBtn');
            const standardLoginForm = document.getElementById('standardLoginForm');
            const customModal = document.getElementById('customModal');
            const modalTitle = document.getElementById('modalTitle');
            const modalText = document.getElementById('modalText');
            const modalIcon = document.getElementById('modalIcon');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const modalOverlay = document.getElementById('modalOverlay');

            // SVG Icons untuk Modal
            const iconGoogle = `<div class="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-500 mx-auto"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg></div>`;
            const iconEmail = `<div class="w-12 h-12 rounded-full bg-green-50 flex items-center justify-center text-green-500 mx-auto"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>`;

            // Simulasi klik login Google
            googleLoginBtn.addEventListener('click', () => {
                modalIcon.innerHTML = iconGoogle;
                modalTitle.innerText = 'Redirect ke Google';
                modalText.innerHTML = 'Di sistem nyata, ini akan membuka popup OAuth Google (misalnya menggunakan Firebase Auth atau Google Identity Services) untuk memilih akun Anda.';
                customModal.classList.remove('hidden');
            });

            // Simulasi submit form standar
            standardLoginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                
                modalIcon.innerHTML = iconEmail;
                modalTitle.innerText = 'Login Standar Berhasil';
                modalText.innerHTML = `Mencoba login dengan email:<br><strong class="text-gray-900">${email}</strong><br><br>Di sistem nyata, ini akan memvalidasi password ke server/database Anda.`;
                customModal.classList.remove('hidden');
            });

            // Tutup Modal
            const closeModal = () => customModal.classList.add('hidden');
            closeModalBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', closeModal);
        });
    </script>
</body>
</html>
